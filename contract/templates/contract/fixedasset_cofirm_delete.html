{% extends 'contract/base.html' %}

{% block content %}
<h2>Удаление основного средства</h2>

<p>Вы уверены, что хотите удалить основное средство "{{ asset.name }}"?</p>
<p>Код внутреннего учета: {{ asset.internal_code|default:"не задан" }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Да, удалить</button>
    <a href="{% url 'contract:fixed_asset_list' %}">Отмена</a>
</form>
{% endblock %}

{% extends 'tracking/base.html' %}

{% block title %}Удаление водителя{% endblock %}

{% block content %}
<div class="confirm-delete">
    <h2>⚠️ Подтверждение удаления</h2>
    <p>Вы уверены, что хотите удалить водителя <strong>{{ driver }}</strong>?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">🗑️ Удалить</button>
        <a href="{% url 'tracking:driver_list_tr' %}" class="btn btn-secondary">❌ Отмена</a>
    </form>
</div>
{% endblock %}

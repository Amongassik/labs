{% extends 'tracking/base.html' %}

{% block title %}Диаграмма пробегов водителей{% endblock %}

{% block content %}
<div class="chart-container">
    <h2>📊 Диаграмма пробегов водителей</h2>
    
    <canvas id="driverChart" width="800" height="400"></canvas>
    
    <div class="chart-info">
        <p>🔵 Синие столбцы - пробег каждого водителя</p>
        <p>🔴 Красная линия - средний пробег ({{ avg_mileage|floatformat:0 }} км)</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('driverChart').getContext('2d');
    
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{ driver_names|safe }},
            datasets: [
                {
                    label: 'Пробег (км)',
                    data: {{ driver_mileages|safe }},
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                },
                {
                    label: 'Средний пробег',
                    data: Array({{ driver_names|length }}).fill({{ avg_mileage }}),
                    type: 'line',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    fill: false
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Пробег (км)'
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Водители'
                    }
                }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return `${context.dataset.label}: ${context.raw} км`;
                        }
                    }
                }
            }
        }
    });
</script>
{% endblock %}
